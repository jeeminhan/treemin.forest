<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greek Explorer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fafaf9;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{max-width:600px;width:100%;padding:3rem 2rem;text-align:center;position:relative}
.year{display:inline-block;font-size:.7rem;letter-spacing:.15em;color:#7c7c8a;border:1px solid #27272a;border-radius:999px;padding:.25rem .75rem;margin-bottom:2rem}
.glyph{font-size:5rem;margin-bottom:1rem;background:linear-gradient(180deg,#c084fc,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:300;font-family:serif;line-height:1}
h1{font-size:2.8rem;font-weight:800;letter-spacing:-.03em;color:#e4e4e7;margin-bottom:.5rem}
.sub{color:#a1a1aa;font-size:1rem;margin-bottom:2rem;line-height:1.6}
.card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:1.5rem;margin-bottom:2rem;text-align:left}
.card-word{font-size:1.8rem;font-family:serif;color:#c084fc;margin-bottom:.25rem}
.card-roman{font-size:.85rem;color:#71717a;margin-bottom:.5rem}
.card-def{font-size:.95rem;color:#a1a1aa;line-height:1.5}
.pills{display:flex;gap:.5rem;justify-content:center}
.pill{background:#1e1b4b;border:1px solid #3b0764;border-radius:999px;padding:.3rem .8rem;font-size:.75rem;color:#c084fc}
</style>
</head>
<body>
<div class="wrap">
  <div class="year">2025</div>
  <div class="glyph">&lambda;&omicron;&gamma;&omicron;&sigmaf;</div>
  <h1>Greek Explorer</h1>
  <p class="sub">Vocabulary exploration for Greek language learners.<br>Search, browse, and study word roots and morphology.</p>
  <div class="card">
    <div class="card-word">&alpha;&gamma;&alpha;&pi;&eta;</div>
    <div class="card-roman">agape</div>
    <div class="card-def">Unconditional love; the highest form of love in Greek philosophy and theology.</div>
  </div>
  <div class="pills">
    <span class="pill">React</span>
    <span class="pill">Supabase</span>
  </div>
</div>
</body>
</html>
