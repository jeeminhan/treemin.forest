<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Tailor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0a0e;color:#fafaf9;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.wrap{max-width:600px;width:100%;padding:3rem 2rem;text-align:center}
.year{display:inline-block;font-size:.7rem;letter-spacing:.15em;color:#7c7c8a;border:1px solid #27272a;border-radius:999px;padding:.25rem .75rem;margin-bottom:2rem}
h1{font-size:2.8rem;font-weight:800;letter-spacing:-.03em;background:linear-gradient(135deg,#818cf8,#6366f1,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.sub{color:#a1a1aa;font-size:1rem;margin-bottom:2rem;line-height:1.6}
.mockup{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:1.25rem;margin-bottom:2rem;text-align:left}
.mockup-bar{display:flex;gap:6px;margin-bottom:1rem}
.mockup-bar span{width:8px;height:8px;border-radius:50%;background:#27272a}
.mockup-bar span:first-child{background:#ef4444}
.mockup-bar span:nth-child(2){background:#eab308}
.mockup-bar span:nth-child(3){background:#22c55e}
.line{height:8px;border-radius:4px;margin-bottom:6px}
.l1{width:45%;background:linear-gradient(90deg,#4f46e5,#6366f1)}
.l2{width:80%;background:#27272a}
.l3{width:65%;background:#27272a}
.l4{width:90%;background:#27272a}
.l5{width:40%;background:linear-gradient(90deg,#4f46e5,#818cf8);margin-top:12px}
.l6{width:75%;background:#27272a}
.l7{width:55%;background:#27272a}
.match{display:inline-block;background:linear-gradient(135deg,#4f46e5,#6366f1);border-radius:8px;padding:.5rem 1.25rem;font-size:.85rem;font-weight:600;color:white;margin-bottom:2rem}
.pills{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap}
.pill{background:#1e1b4b;border:1px solid #312e81;border-radius:999px;padding:.3rem .8rem;font-size:.75rem;color:#a5b4fc}
</style>
</head>
<body>
<div class="wrap">
  <div class="year">2026</div>
  <h1>Resume Tailor</h1>
  <p class="sub">AI-powered resume optimizer. Paste a job description,<br>get a tailored resume with PDF export.</p>
  <div class="mockup">
    <div class="mockup-bar"><span></span><span></span><span></span></div>
    <div class="line l1"></div>
    <div class="line l2"></div>
    <div class="line l3"></div>
    <div class="line l4"></div>
    <div class="line l5"></div>
    <div class="line l6"></div>
    <div class="line l7"></div>
  </div>
  <div class="match">92% match score</div>
  <div class="pills">
    <span class="pill">Next.js</span>
    <span class="pill">AI SDK</span>
    <span class="pill">React PDF</span>
  </div>
</div>
</body>
</html>
